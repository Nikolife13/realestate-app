<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Real Estate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create New Account</h2>
            <form id="registerForm">
                <input type="text" id="regUsername" placeholder="Username (min 3 chars)" required>
                <input type="password" id="regPassword" placeholder="Password (min 6 chars)" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="email" id="regConfirmEmail" placeholder="Confirm Email" required>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
